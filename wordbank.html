<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单词库 · Foreign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/theme-buttons.css" />
  <link rel="stylesheet" href="css/dock.css" />
  <style>
    .bg-image{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:background-image .8s,opacity .6s;animation:bgBreath 16s ease-in-out infinite alternate}
    .bg-canvas{position:fixed;inset:0;z-index:1;width:100%;height:100%;pointer-events:none}
    .bg-overlay{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 20%,rgba(0,0,0,.55) 100%)}
    @keyframes bgBreath{0%{transform:scale(1)}100%{transform:scale(1.035)}}

    .page-wrap{position:relative;z-index:10;max-width:760px;margin:0 auto;padding:80px 24px 120px;min-height:100vh}

    .page-header{display:flex;align-items:center;gap:16px;margin-bottom:40px}
    .back-link{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:7px 14px;cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.05em;flex-shrink:0}
    .back-link:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.13)}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vw,44px);font-weight:600;color:#fff;letter-spacing:-.02em}

    .dim-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .dim-tab{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.45);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:6px 14px;cursor:pointer;transition:all .2s;letter-spacing:.04em}
    .dim-tab:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
    .dim-tab.on{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35);color:#fff}

    .search-wrap{margin-bottom:20px}
    .search-input{width:100%;padding:11px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#f1f5f9;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .18s}
    .search-input:focus{border-color:rgba(255,255,255,.3)}
    .search-input::placeholder{color:rgba(255,255,255,.28)}

    .stats-bar{display:flex;gap:20px;margin-bottom:24px;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em}
    .stats-bar span{display:flex;align-items:center;gap:5px}
    .stats-bar strong{color:rgba(255,255,255,.7);font-size:14px;font-family:'Cormorant Garamond',serif;font-weight:600}

    .word-list{display:flex;flex-direction:column;gap:10px}
    .word-card{background:rgba(255,255,255,.07);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.11);border-radius:16px;padding:18px 22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:16px}
    .word-card:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22);transform:translateX(4px)}
    .word-card.expanded{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.1)}
    .word-main{flex:1;min-width:0}
    .word-en{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#fff;margin-bottom:3px;display:flex;align-items:center;gap:10px}
    .word-phonetic{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.38);font-weight:300}
    .word-zh{font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,.6);margin-top:2px}
    .word-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
    .word-level{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:2px 7px;letter-spacing:.06em}
    .word-status{font-size:9px;display:flex;align-items:center;gap:4px;color:rgba(255,255,255,.35);font-family:'Space Mono',monospace}
    .status-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2)}
    .status-dot.new{background:#64748b}
    .status-dot.learning{background:#f59e0b}
    .status-dot.review{background:#22c55e}
    .status-dot.mastered{background:#818cf8}

    .word-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)}
    .word-card.expanded .word-detail{display:block}
    .word-sentence{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:rgba(255,255,255,.75);line-height:1.7;margin-bottom:6px}
    .blank-word{color:#fff;font-style:normal;font-weight:600;border-bottom:1px solid rgba(255,255,255,.4)}
    .word-translation{font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,.45)}
    .word-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
    .word-action-btn{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 14px;cursor:pointer;transition:all .2s;letter-spacing:.04em}
    .word-action-btn:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.9)}
    .word-action-btn.in-review{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:#4ade80}
    .word-action-btn.in-review:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.3);color:#f87171}
    /* 收藏按钮 */
    .word-action-btn.fav-btn.favorited{background:rgba(250,204,21,.12);border-color:rgba(250,204,21,.35);color:#fbbf24}
    .word-action-btn.fav-btn.favorited:hover{background:rgba(250,204,21,.2)}

    .empty-state{text-align:center;padding:80px 24px;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,.3)}
    .empty-state .empty-icon{font-size:48px;margin-bottom:16px}
    .empty-state p{font-size:14px}

    body.dm .back-link{color:rgba(0,0,0,.5);background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12)}
    body.dm .page-title{color:#111}
    body.dm .dim-tab{color:rgba(0,0,0,.45);background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}
    body.dm .dim-tab.on{background:rgba(0,0,0,.12);border-color:rgba(0,0,0,.28);color:#111}
    body.dm .search-input{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:#111}
    body.dm .word-card{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}
    body.dm .word-card:hover{background:rgba(0,0,0,.09)}
    body.dm .word-en{color:#111}
    body.dm .word-zh{color:rgba(0,0,0,.6)}
    body.dm .word-sentence{color:rgba(0,0,0,.65)}
    body.dm .word-translation{color:rgba(0,0,0,.42)}
    body.dm .stats-bar{color:rgba(0,0,0,.35)}
    body.dm .stats-bar strong{color:rgba(0,0,0,.65)}
    body.dm .word-action-btn{color:rgba(0,0,0,.5);background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12)}
  </style>
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div id="bg-image" class="bg-image"></div>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <div class="page-wrap">
    <div class="page-header">
      <a href="index.html" class="back-link">← 返回</a>
      <h1 class="page-title">单词库</h1>
    </div>

    <div class="dim-tabs" id="dim-tabs">
      <div class="dim-tab on" data-dim="all">全部</div>
      <div class="dim-tab" data-dim="__favorites__">⭐ 收藏</div>
    </div>

    <div class="search-wrap">
      <input class="search-input" id="search-input" placeholder="搜索单词或中文含义…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>

    <div class="stats-bar" id="stats-bar">
      <span><strong id="stat-shown">0</strong> 词</span>
      <span>🟡 <strong id="stat-learning">0</strong> 学习中</span>
      <span>🟢 <strong id="stat-review">0</strong> 复习中</span>
      <span>⭐ <strong id="stat-mastered">0</strong> 已掌握</span>
    </div>

    <div class="word-list" id="word-list"></div>
  </div>

  <script type="module">
    import { startAnim } from './js/animations.js';
    import { WORDS, DIMENSIONS, TOTAL } from './js/wordbank.js';
    import { initDock } from './js/dock.js';
    import { pushToCloud, getCurrentUser } from './js/auth.js';

    // ── 背景 ──
    const THEME_IMGS  = {ocean:'assets/images/ocean.jpg',fog_forest:'assets/images/fog_forest.jpg',galaxy:'assets/images/galaxy.jpg',rain:'assets/images/rain.jpg',aurora:'assets/images/aurora.jpg',sakura:'assets/images/sakura.jpg',sunset:'assets/images/sunset.jpg',snow:'assets/images/snow.jpg',forest_green:'assets/images/forest_green.jpg'};
    const THEME_ANIMS = {ocean:'ocean',fog_forest:'mist',galaxy:'stars',rain:'rain',aurora:'none',sakura:'sakura',sunset:'clouds',snow:'snow',forest_green:'forest'};
    const theme = localStorage.getItem('fg_theme') || 'ocean';
    document.body.className = `theme-${theme}`;
    if(theme==='white'){document.body.style.background='#f6f5f0';document.body.classList.add('dm');}
    else if(theme==='black'){document.body.style.background='#080808';}
    const bgEl=document.getElementById('bg-image'), cvEl=document.getElementById('bg-canvas');
    cvEl.width=window.innerWidth; cvEl.height=window.innerHeight;
    window.addEventListener('resize',()=>{cvEl.width=window.innerWidth;cvEl.height=window.innerHeight;});
    if(THEME_IMGS[theme]){bgEl.style.backgroundImage=`url(${THEME_IMGS[theme]})`;bgEl.style.opacity='1';}
    else{bgEl.style.opacity='0';}
    if(THEME_ANIMS[theme]&&THEME_ANIMS[theme]!=='none') startAnim(THEME_ANIMS[theme],cvEl);

    initDock();

    // ── 数据工具 ──
    const LEVEL_MAP = {1:'A1',2:'A2',3:'B1',4:'B2',5:'C1',6:'C2'};
    const STATUS_LABEL = {new:'未学习',learning:'学习中',review:'复习中',mastered:'已掌握'};

    let cards = {};
    try { cards = JSON.parse(localStorage.getItem('fg_cards')||'{}'); } catch{}

    function getStatus(wordId) {
      const c = cards[wordId];
      if (!c || c.state==='new') return 'new';
      if (c.state==='learning'||c.state==='relearn') return 'learning';
      if (c.reps>=5||(c.stability!=null&&c.stability>=21)) return 'mastered';
      return 'review';
    }

    // ── 回炉本 ──
    function loadWrong(){ try{return JSON.parse(localStorage.getItem('fg_wrong')||'{}')}catch{return{}} }
    function saveWrong(d){ localStorage.setItem('fg_wrong',JSON.stringify(d)); }

    // ── 收藏 ──
    function loadFavs(){ try{return JSON.parse(localStorage.getItem('fg_favorites')||'{}')}catch{return{}} }
    function saveFavs(d){
      localStorage.setItem('fg_favorites',JSON.stringify(d));
      getCurrentUser().then(u=>{ if(u) pushToCloud(); }).catch(()=>{});
    }

    // ── 维度 tabs ──
    const tabWrap = document.getElementById('dim-tabs');
    Object.entries(DIMENSIONS).forEach(([key,dim])=>{
      const tab=document.createElement('div');
      tab.className='dim-tab'; tab.dataset.dim=key;
      tab.textContent=dim.icon+' '+dim.label;
      tabWrap.appendChild(tab);
    });

    let activeDim='all', searchQ='';

    tabWrap.addEventListener('click',e=>{
      const tab=e.target.closest('.dim-tab');
      if(!tab)return;
      activeDim=tab.dataset.dim;
      document.querySelectorAll('.dim-tab').forEach(t=>t.classList.toggle('on',t.dataset.dim===activeDim));
      renderList();
    });

    document.getElementById('search-input').addEventListener('input',e=>{
      searchQ=e.target.value.trim().toLowerCase();
      renderList();
    });

    // ── 渲染 ──
    function renderList(){
      const list=document.getElementById('word-list');
      const favs=loadFavs();

      let words;
      if(activeDim==='__favorites__'){
        words=WORDS.filter(w=>!!favs[w.id]);
      } else if(activeDim==='all'){
        words=[...WORDS];
      } else {
        words=WORDS.filter(w=>w.dim===activeDim);
      }
      if(searchQ) words=words.filter(w=>w.word.toLowerCase().includes(searchQ)||(w.zh||'').includes(searchQ));

      // 统计（全库）
      let learningCnt=0,reviewCnt=0,masteredCnt=0;
      WORDS.forEach(w=>{
        const s=getStatus(w.id);
        if(s==='learning')learningCnt++;
        if(s==='review')reviewCnt++;
        if(s==='mastered')masteredCnt++;
      });
      document.getElementById('stat-shown').textContent=words.length;
      document.getElementById('stat-learning').textContent=learningCnt;
      document.getElementById('stat-review').textContent=reviewCnt;
      document.getElementById('stat-mastered').textContent=masteredCnt;

      list.innerHTML='';
      if(!words.length){
        const msg=activeDim==='__favorites__'?'还没有收藏的单词<br><small style="font-size:12px;opacity:.6">在单词卡片里点 ⭐ 收藏</small>':'没有找到相关单词';
        list.innerHTML=`<div class="empty-state"><div class="empty-icon">${activeDim==='__favorites__'?'⭐':'📭'}</div><p>${msg}</p></div>`;
        return;
      }

      const wrong=loadWrong();

      words.forEach(word=>{
        const status=getStatus(word.id);
        const dim=DIMENSIONS[word.dim]||{icon:'',label:word.dim};
        const inReview=!!wrong[word.id];
        const isFav=!!favs[word.id];
        const levelLabel=LEVEL_MAP[word.level]||word.level;

        function hl(str){
          if(!searchQ)return str;
          const idx=str.toLowerCase().indexOf(searchQ);
          if(idx<0)return str;
          return str.slice(0,idx)+`<mark style="background:rgba(255,220,0,.3);border-radius:2px">${str.slice(idx,idx+searchQ.length)}</mark>`+str.slice(idx+searchQ.length);
        }

        const card=document.createElement('div');
        card.className='word-card';

        const exampleHl=(word.example||'').replace(
          word.word,
          `<span class="blank-word">${word.word}</span>`
        );

        card.innerHTML=`
          <div class="word-main">
            <div class="word-en">${hl(word.word)}<span class="word-phonetic">${word.phonetic||''}</span></div>
            <div class="word-zh">${hl(word.zh||'')}</div>
            <div class="word-detail">
              <div class="word-sentence">${exampleHl}</div>
              <div class="word-translation">${word.exZh||''}</div>
              <div class="word-actions">
                <button class="word-action-btn fav-btn ${isFav?'favorited':''}" data-id="${word.id}">
                  ${isFav?'⭐ 已收藏':'☆ 收藏'}
                </button>
                <button class="word-action-btn review-btn ${inReview?'in-review':''}" data-id="${word.id}">
                  ${inReview?'✓ 已在回炉本':'＋ 加入回炉本'}
                </button>
              </div>
            </div>
          </div>
          <div class="word-meta">
            <span class="word-level">${levelLabel} · ${dim.icon}</span>
            <span class="word-status"><span class="status-dot ${status}"></span>${STATUS_LABEL[status]}</span>
          </div>
        `;

        // 展开/收起
        card.addEventListener('click',e=>{
          if(e.target.closest('.word-action-btn'))return;
          card.classList.toggle('expanded');
        });

        // 收藏
        card.querySelector('.fav-btn').addEventListener('click',e=>{
          e.stopPropagation();
          const btn=e.currentTarget;
          const f=loadFavs();
          if(f[word.id]){
            delete f[word.id];
            btn.textContent='☆ 收藏';
            btn.classList.remove('favorited');
            // 收藏 tab 下移除这张卡
            if(activeDim==='__favorites__'){
              card.style.transition='opacity .22s,transform .22s';
              card.style.opacity='0'; card.style.transform='translateX(12px)';
              setTimeout(()=>renderList(),230);
            }
          } else {
            f[word.id]=Date.now();
            btn.textContent='⭐ 已收藏';
            btn.classList.add('favorited');
          }
          saveFavs(f);
        });

        // 回炉本
        card.querySelector('.review-btn').addEventListener('click',e=>{
          e.stopPropagation();
          const btn=e.currentTarget;
          const w=loadWrong();
          if(w[word.id]){
            delete w[word.id];
            btn.textContent='＋ 加入回炉本';
            btn.classList.remove('in-review');
          } else {
            w[word.id]=(w[word.id]||0)+1;
            btn.textContent='✓ 已在回炉本';
            btn.classList.add('in-review');
          }
          saveWrong(w);
        });

        list.appendChild(card);
      });
    }

    renderList();
  </script>
</body>
</html>
