<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇图谱 · Foreign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/theme-buttons.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;min-height:100vh;color:#f1f5f9;overflow-x:hidden}
.bg-image{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:background-image .8s,opacity .6s;animation:bgBreath 16s ease-in-out infinite alternate}
.bg-canvas{position:fixed;inset:0;z-index:1;width:100%;height:100%;pointer-events:none}
.bg-overlay{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 20%,rgba(0,0,0,.58) 100%)}
@keyframes bgBreath{0%{transform:scale(1)}100%{transform:scale(1.035)}}
.page{position:relative;z-index:3;min-height:100vh;padding:0 0 80px}

nav{display:flex;align-items:center;justify-content:space-between;padding:28px 48px 0;margin-bottom:40px}
.nav-back{display:flex;align-items:center;gap:8px;color:rgba(241,245,249,.7);text-decoration:none;font-size:14px;font-family:'Space Mono',monospace;letter-spacing:.02em;transition:color .2s}
.nav-back:hover{color:#f1f5f9}
.nav-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.nav-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;letter-spacing:.06em;opacity:.9}
.nav-right{width:120px}

.main{max-width:1100px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:24px}

.card{background:rgba(15,23,42,.52);border:1px solid rgba(241,245,249,.1);border-radius:20px;padding:28px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.card-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(241,245,249,.45);margin-bottom:18px}

.card-total{grid-column:1/-1}
.progress-row{display:flex;align-items:baseline;gap:16px;margin-bottom:20px}
.progress-big{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:500;line-height:1;color:#f1f5f9}
.progress-sub{font-size:15px;color:rgba(241,245,249,.55)}
.progress-track{height:6px;background:rgba(241,245,249,.1);border-radius:99px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--theme-color,#3b82f6),rgba(241,245,249,.6));transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.progress-labels{display:flex;justify-content:space-between;font-size:12px;color:rgba(241,245,249,.4);font-family:'Space Mono',monospace}
.dim-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.dim-bar-name{font-size:12px;color:rgba(241,245,249,.6);margin-bottom:6px;display:flex;justify-content:space-between}
.dim-bar-name span{color:rgba(241,245,249,.35);font-family:'Space Mono',monospace;font-size:11px}
.dim-bar-track{height:4px;background:rgba(241,245,249,.1);border-radius:99px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:99px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}

.card-radar{grid-column:1;grid-row:2}
#radarCanvas{display:block;margin:0 auto}

.card-heat{grid-column:2;grid-row:2}
.heat-grid{display:grid;gap:3px;margin-top:4px}
.heat-cell{border-radius:3px;cursor:default;transition:transform .15s}
.heat-cell:hover{transform:scale(1.3)}
.heat-months{display:flex;font-size:10px;font-family:'Space Mono',monospace;color:rgba(241,245,249,.35);margin-top:6px;letter-spacing:.04em}
.heat-legend{display:flex;align-items:center;gap:6px;margin-top:14px;font-size:11px;color:rgba(241,245,249,.4);font-family:'Space Mono',monospace}
.heat-swatch{width:10px;height:10px;border-radius:2px}
.heat-tooltip{position:fixed;background:rgba(15,23,42,.95);border:1px solid rgba(241,245,249,.15);border-radius:8px;padding:6px 10px;font-size:12px;pointer-events:none;display:none;z-index:999;font-family:'DM Sans',sans-serif;white-space:nowrap}

.card-weak{grid-column:1/-1}
.weak-list{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px}
.weak-item{background:rgba(241,245,249,.06);border:1px solid rgba(241,245,249,.1);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
.weak-item:hover{background:rgba(241,245,249,.1);border-color:rgba(241,245,249,.2);transform:translateY(-2px)}
.weak-icon{font-size:22px;margin-bottom:10px}
.weak-dim-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;margin-bottom:4px;color:#f1f5f9}
.weak-pct{font-family:'Space Mono',monospace;font-size:12px;color:rgba(241,245,249,.45);margin-bottom:10px}
.weak-words{display:flex;flex-wrap:wrap;gap:5px}
.weak-word-tag{font-size:11px;background:rgba(241,245,249,.08);border-radius:6px;padding:3px 8px;color:rgba(241,245,249,.65)}
.weak-cta{margin-top:12px;font-size:12px;color:var(--theme-color,#3b82f6);display:flex;align-items:center;gap:4px}
.weak-cta svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* 空状态 */
.heat-empty{font-size:12px;color:rgba(241,245,249,.35);font-family:'Space Mono',monospace;margin-top:16px;line-height:1.8}

body.theme-white{color:#1e293b}
body.theme-white .card{background:rgba(255,255,255,.72);border-color:rgba(30,41,59,.1)}
body.theme-white .card-label{color:rgba(30,41,59,.45)}
body.theme-white .progress-big,.theme-white .weak-dim-name,.theme-white .nav-title{color:#1e293b}
body.theme-white .nav-back{color:rgba(30,41,59,.6)}
body.theme-white .nav-back:hover{color:#1e293b}
body.theme-white .progress-track,.theme-white .dim-bar-track{background:rgba(30,41,59,.1)}
body.theme-white .progress-labels,.theme-white .progress-sub,.theme-white .dim-bar-name span{color:rgba(30,41,59,.4)}
body.theme-white .dim-bar-name{color:rgba(30,41,59,.65)}
body.theme-white .weak-item{background:rgba(30,41,59,.05);border-color:rgba(30,41,59,.1)}
body.theme-white .weak-item:hover{background:rgba(30,41,59,.1);border-color:rgba(30,41,59,.2)}
body.theme-white .weak-pct,.theme-white .heat-months,.theme-white .heat-legend{color:rgba(30,41,59,.45)}
body.theme-white .weak-word-tag{background:rgba(30,41,59,.08);color:rgba(30,41,59,.6)}
body.theme-white .heat-tooltip{background:rgba(255,255,255,.97);border-color:rgba(30,41,59,.15);color:#1e293b}
body.theme-white .heat-empty{color:rgba(30,41,59,.35)}
</style>
</head>
<body>

<div id="bg-image" class="bg-image"></div>
<canvas id="bg-canvas" class="bg-canvas"></canvas>
<div class="bg-overlay"></div>
<div class="heat-tooltip" id="heatTip"></div>

<div class="page">
  <nav>
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </a>
    <span class="nav-title">词汇图谱</span>
    <div class="nav-right"></div>
  </nav>

  <div class="main">
    <div class="card card-total" id="cardTotal">
      <div class="card-label">总体进度</div>
      <div class="progress-row">
        <div class="progress-big" id="learnedCount">0</div>
        <div class="progress-sub">已学词汇 / <span id="totalCount">0</span> 词</div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-labels">
        <span>0%</span>
        <span id="pctLabel">0% 已接触</span>
        <span>100%</span>
      </div>
      <div class="dim-bars" id="dimBars"></div>
    </div>

    <div class="card card-radar">
      <div class="card-label">六维度掌握度</div>
      <canvas id="radarCanvas" width="320" height="300" role="img" aria-label="六维度词汇掌握度雷达图"></canvas>
    </div>

    <div class="card card-heat">
      <div class="card-label">学习热力图</div>
      <div id="heatmapWrap"></div>
    </div>

    <div class="card card-weak">
      <div class="card-label">薄弱维度 · 推荐练习</div>
      <div class="weak-list" id="weakList"></div>
    </div>
  </div>
</div>

<script type="module">
import { startAnim } from './js/animations.js';
import { WORDS, DIMENSIONS, getDimStats, getWeakDimensions, getByDimension } from './js/wordbank.js';

const THEME_IMGS  = {ocean:'assets/images/ocean.jpg',fog_forest:'assets/images/fog_forest.jpg',galaxy:'assets/images/galaxy.jpg',rain:'assets/images/rain.jpg',aurora:'assets/images/aurora.jpg',sakura:'assets/images/sakura.jpg',sunset:'assets/images/sunset.jpg',snow:'assets/images/snow.jpg',forest_green:'assets/images/forest_green.jpg'};
const THEME_ANIMS = {ocean:'ocean',fog_forest:'mist',galaxy:'stars',rain:'rain',aurora:'aurora',sakura:'sakura',sunset:'clouds',snow:'snow',forest_green:'forest'};
const THEME_COLORS= {ocean:'#3b82f6',fog_forest:'#6ee7b7',galaxy:'#818cf8',rain:'#93c5fd',aurora:'#34d399',sakura:'#f9a8d4',sunset:'#fb923c',snow:'#bae6fd',forest_green:'#86efac',white:'#64748b',black:'#94a3b8'};

const theme = localStorage.getItem('fg_theme') || 'ocean';
document.body.className = `theme-${theme}`;
const themeColor = THEME_COLORS[theme] || '#3b82f6';
document.documentElement.style.setProperty('--theme-color', themeColor);
if(theme==='white'){document.body.style.background='#f6f5f0';document.body.classList.add('dm');}
else if(theme==='black'){document.body.style.background='#080808';}
const bg = document.getElementById('bg-image');
const cv = document.getElementById('bg-canvas');
cv.width=window.innerWidth; cv.height=window.innerHeight;
window.addEventListener('resize',()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;});
if(THEME_IMGS[theme]){bg.style.backgroundImage=`url(${THEME_IMGS[theme]})`;bg.style.opacity='1';}
else{bg.style.opacity='0';}
if(THEME_ANIMS[theme]) startAnim(THEME_ANIMS[theme], cv);

const rawCards = JSON.parse(localStorage.getItem('fg_cards') || '{}');
const studyLog  = JSON.parse(localStorage.getItem('fg_study_log') || '{}');

const dimStats = getDimStats(rawCards);
const total = WORDS.length;
const learned = Object.values(dimStats).reduce((s,d) => s+d.learned, 0);
const pct = total ? learned/total : 0;

document.getElementById('learnedCount').textContent = learned;
document.getElementById('totalCount').textContent = total;
document.getElementById('pctLabel').textContent = `${Math.round(pct*100)}% 已接触`;
setTimeout(() => { document.getElementById('progressFill').style.width = `${Math.round(pct*100)}%`; }, 100);

const dimColors = {daily:'#3b82f6',emotion:'#f9a8d4',nature:'#86efac',abstract:'#818cf8',social:'#fb923c',academic:'#6ee7b7'};
const dimBarsEl = document.getElementById('dimBars');
for(const [dim, info] of Object.entries(DIMENSIONS)){
  const st = dimStats[dim];
  const el = document.createElement('div');
  el.className = 'dim-bar-item';
  el.innerHTML = `<div class="dim-bar-name">${info.icon} ${info.label}<span>${st.learned}/${st.total}</span></div><div class="dim-bar-track"><div class="dim-bar-fill" style="width:0%;background:${dimColors[dim]}"></div></div>`;
  dimBarsEl.appendChild(el);
  setTimeout(() => el.querySelector('.dim-bar-fill').style.width = `${Math.round(st.pct*100)}%`, 150);
}

// 雷达图
const radarCv = document.getElementById('radarCanvas');
const ctx = radarCv.getContext('2d');
const dims = Object.keys(DIMENSIONS);
const labels = dims.map(d => DIMENSIONS[d].label);
const values = dims.map(d => dimStats[d].pct);
const N = dims.length;
const cx = 160, cy = 155, R = 115;
const PI2 = Math.PI*2;

function polarPt(i, r){
  const angle = (PI2*i/N) - Math.PI/2;
  return [cx+Math.cos(angle)*r, cy+Math.sin(angle)*r];
}

const isDark = theme !== 'white';
const gridColor  = isDark ? 'rgba(241,245,249,.12)' : 'rgba(30,41,59,.12)';
const labelColor = isDark ? 'rgba(241,245,249,.6)'  : 'rgba(30,41,59,.6)';
const fillColor  = themeColor + '44';

let prog = 0;
function drawRadar(p){
  ctx.clearRect(0,0,radarCv.width,radarCv.height);
  [.25,.5,.75,1].forEach(r=>{
    ctx.beginPath();
    for(let i=0;i<N;i++){const[x,y]=polarPt(i,R*r);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.closePath();ctx.strokeStyle=gridColor;ctx.lineWidth=1;ctx.stroke();
  });
  for(let i=0;i<N;i++){
    const[x,y]=polarPt(i,R);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);
    ctx.strokeStyle=gridColor;ctx.lineWidth=1;ctx.stroke();
    const[lx,ly]=polarPt(i,R+22);
    ctx.font='12px "DM Sans"';ctx.fillStyle=labelColor;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(labels[i],lx,ly);
    ctx.font='10px "Space Mono"';ctx.fillStyle=themeColor+'bb';
    ctx.fillText(Math.round(values[i]*100)+'%',lx,ly+14);
  }
  ctx.beginPath();
  for(let i=0;i<N;i++){
    const v=values[i]*p;
    const[x,y]=polarPt(i,R*Math.max(v,0.02));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fillStyle=fillColor;ctx.fill();
  ctx.strokeStyle=themeColor;ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<N;i++){
    const v=values[i]*p;
    const[x,y]=polarPt(i,R*Math.max(v,0.02));
    ctx.beginPath();ctx.arc(x,y,4,0,PI2);ctx.fillStyle=themeColor;ctx.fill();
  }
}
function animRadar(){
  prog+=.035;if(prog>1)prog=1;
  drawRadar(prog);
  if(prog<1)requestAnimationFrame(animRadar);
}
setTimeout(animRadar,200);

// 热力图
function buildHeatmap(){
  const wrap = document.getElementById('heatmapWrap');
  const today = new Date();
  const WEEKS = 26, DAYS = 7;
  const cells = WEEKS*DAYS;
  const dates = [];
  for(let i=cells-1;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    dates.push({key:d.toISOString().slice(0,10),d});
  }

  const hasData = Object.keys(studyLog).length > 0;

  const maxCount = Math.max(1,...Object.values(studyLog));

  function cellColor(count){
    if(!count) return isDark?'rgba(241,245,249,.07)':'rgba(30,41,59,.08)';
    const idx=Math.min(Math.floor(count/maxCount*5),4);
    const alpha=[.2,.4,.6,.8,1][idx];
    return themeColor+Math.round(alpha*255).toString(16).padStart(2,'0');
  }

  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthPositions=[];
  for(let w=0;w<WEEKS;w++){
    const d=dates[w*7];
    if(d&&(w===0||dates[(w-1)*7].d.getMonth()!==d.d.getMonth())){
      monthPositions.push({w,name:monthNames[d.d.getMonth()]});
    }
  }

  const CELL=13,GAP=3;
  const gridW=WEEKS*(CELL+GAP);

  const monthRow=document.createElement('div');
  monthRow.className='heat-months';
  monthRow.style.cssText=`width:${gridW}px;position:relative;height:16px;margin-bottom:4px`;
  monthPositions.forEach(({w,name})=>{
    const span=document.createElement('span');
    span.textContent=name;
    span.style.cssText=`position:absolute;left:${w*(CELL+GAP)}px`;
    monthRow.appendChild(span);
  });
  wrap.appendChild(monthRow);

  const grid=document.createElement('div');
  grid.style.cssText=`display:grid;grid-template-columns:repeat(${WEEKS},${CELL}px);grid-template-rows:repeat(${DAYS},${CELL}px);gap:${GAP}px;width:fit-content`;

  const tip=document.getElementById('heatTip');
  dates.forEach(({key,d})=>{
    const count=studyLog[key]||0;
    const cell=document.createElement('div');
    cell.className='heat-cell';
    cell.style.cssText=`width:${CELL}px;height:${CELL}px;background:${cellColor(count)};border-radius:2px`;
    cell.addEventListener('mouseenter',(ev)=>{
      const dateStr=`${d.getMonth()+1}月${d.getDate()}日`;
      tip.textContent=count?`${dateStr} · 学了 ${count} 词`:`${dateStr} · 未学习`;
      tip.style.display='block';
      tip.style.left=ev.clientX+12+'px';
      tip.style.top=ev.clientY-32+'px';
    });
    cell.addEventListener('mouseleave',()=>{tip.style.display='none';});
    grid.appendChild(cell);
  });
  wrap.appendChild(grid);

  const legend=document.createElement('div');
  legend.className='heat-legend';
  legend.innerHTML='<span>少</span>';
  [0,.25,.5,.75,1].forEach(v=>{
    const sw=document.createElement('div');sw.className='heat-swatch';
    sw.style.background=v===0?(isDark?'rgba(241,245,249,.07)':'rgba(30,41,59,.08)'):themeColor+Math.round(v*255).toString(16).padStart(2,'0');
    legend.appendChild(sw);
  });
  legend.insertAdjacentHTML('beforeend','<span>多</span>');
  wrap.appendChild(legend);

  // 连击显示
  const streakDays=parseInt(localStorage.getItem('fg_streak')||'0');
  if(streakDays>0){
    const streakEl=document.createElement('div');
    streakEl.style.cssText=`margin-top:12px;font-size:12px;color:${themeColor};font-family:'Space Mono',monospace`;
    streakEl.textContent=`🔥 连续学习 ${streakDays} 天`;
    wrap.appendChild(streakEl);
  }

  // 没有数据时提示
  if(!hasData){
    const emptyEl=document.createElement('div');
    emptyEl.className='heat-empty';
    emptyEl.textContent='完成每日学习后\n这里会显示你的学习记录';
    wrap.appendChild(emptyEl);
  }
}
buildHeatmap();

// 薄弱维度
function buildWeakDims(){
  const weakDims=getWeakDimensions(rawCards);
  const list=document.getElementById('weakList');
  list.innerHTML='';
  weakDims.forEach(dim=>{
    const info=DIMENSIONS[dim];
    const st=dimStats[dim];
    const words=getByDimension(dim);
    const suggestions=words.filter(w=>!rawCards[w.id]||rawCards[w.id].stability<1).slice(0,4);
    const shown=suggestions.length?suggestions:words.slice(0,4);
    const item=document.createElement('a');
    item.className='weak-item';
    item.href=`learn.html?dim=${dim}`;
    item.innerHTML=`
      <div class="weak-icon">${info.icon}</div>
      <div class="weak-dim-name">${info.label}</div>
      <div class="weak-pct">掌握度 ${Math.round(st.pct*100)}% · ${st.learned}/${st.total} 词</div>
      <div class="weak-words">${shown.map(w=>`<span class="weak-word-tag">${w.word}</span>`).join('')}</div>
      <div class="weak-cta">开始练习 <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    `;
    list.appendChild(item);
  });
}
buildWeakDims();
</script>

</body>
</html>
