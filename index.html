<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foreign · 沉浸式英语学习</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/theme-buttons.css" />
  <link rel="stylesheet" href="css/dock.css" />
  <style>
    /* ── 背景 ─────────────────────────────────────────── */
    .bg-image  { position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:background-image .8s ease,opacity .6s ease;animation:bgBreath 16s ease-in-out infinite alternate; }
    .bg-canvas { position:fixed;inset:0;z-index:1;width:100%;height:100%;pointer-events:none; }
    .bg-overlay{ position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 20%,rgba(0,0,0,.55) 100%); }
    @keyframes bgBreath{0%{transform:scale(1)}100%{transform:scale(1.035)}}

    /* ── 页面布局 ─────────────────────────────────────── */
    .home-wrap { position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px 120px;gap:0; }

    /* Logo */
    .logo-area { text-align:center;margin-bottom:48px; }
    .logo-word  { font-family:'Cormorant Garamond',serif;font-size:clamp(56px,10vw,96px);font-weight:600;color:#fff;letter-spacing:-.03em;line-height:1;margin-bottom:10px;text-shadow:0 2px 40px rgba(0,0,0,.3); }
    .logo-sub   { font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.18em; }

    /* 连击 */
    .streak-badge { display:inline-flex;align-items:center;gap:6px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:6px 14px;font-family:'Space Mono',monospace;font-size:11px;color:#fbbf24;letter-spacing:.06em;margin-bottom:36px;transition:opacity .4s; }
    .streak-badge.hidden { opacity:0;pointer-events:none; }
    .streak-num { font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1; }

    /* ── 三大入口卡片 ─────────────────────────────────── */
    .nav-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;max-width:560px;width:100%; }
    .nav-card {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 20px;
      padding: 28px 16px 22px;
      text-align: center;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
    }
    .nav-card:hover {
      background: rgba(255,255,255,.13);
      border-color: rgba(255,255,255,.28);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,.2);
    }
    .nav-card:active { transform:translateY(-1px); }
    /* primary 卡片：跟随主题色 */
    .nav-card.primary {
      background: rgba(var(--theme-color-rgb, 59,130,246), .18);
      border-color: rgba(var(--theme-color-rgb, 59,130,246), .4);
    }
    .nav-card.primary:hover {
      background: rgba(var(--theme-color-rgb, 59,130,246), .26);
      border-color: rgba(var(--theme-color-rgb, 59,130,246), .6);
      box-shadow: 0 12px 32px rgba(var(--theme-color-rgb, 59,130,246), .2);
    }
    .nav-icon  { font-size:28px;line-height:1; }
    .nav-label { font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:rgba(255,255,255,.85);line-height:1.3; }
    .nav-sub   { font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.06em; }
    .nav-card.primary .nav-label { color:#fff; }
    /* primary 卡片的 sub 用主题色 */
    .nav-card.primary .nav-sub {
      color: var(--theme-color, #3b82f6);
      opacity: .85;
    }

    /* ── 账号 ─────────────────────────────────────────── */
    .account-bar { position:fixed;top:18px;right:20px;z-index:100;display:flex;align-items:center;gap:10px; }
    .account-btn {
      font-family:'Space Mono',monospace;font-size:11px;
      color:rgba(255,255,255,.5);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:8px;padding:7px 13px;
      cursor:pointer;text-decoration:none;
      transition:all .2s;letter-spacing:.05em;
    }
    .account-btn:hover { color:rgba(255,255,255,.9);background:rgba(255,255,255,.12); }

    /* ── 词汇测试入口 ─────────────────────────────────── */
    .quiz-fab {
      position:fixed;bottom:28px;left:28px;z-index:100;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;padding:11px 18px;
      font-family:'DM Sans',sans-serif;font-size:13px;
      color:rgba(255,255,255,.6);
      text-decoration:none;
      transition:all .2s;
      backdrop-filter:blur(12px);
    }
    .quiz-fab:hover {
      background:rgba(255,255,255,.14);
      color:rgba(255,255,255,.9);
      transform:translateY(-2px);
    }

    /* ── 词汇图谱入口 ─────────────────────────────────── */
    .vocab-fab {
      position:fixed;bottom:28px;left:148px;z-index:100;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;padding:11px 18px;
      font-family:'DM Sans',sans-serif;font-size:13px;
      color:rgba(255,255,255,.6);
      text-decoration:none;
      transition:all .2s;
      backdrop-filter:blur(12px);
    }
    .vocab-fab:hover {
      background:rgba(255,255,255,.14);
      color:rgba(255,255,255,.9);
      transform:translateY(-2px);
    }

    /* ── 纯白主题适配 ─────────────────────────────────── */
    body.dm .logo-word  { color:#111;text-shadow:none; }
    body.dm .logo-sub   { color:rgba(0,0,0,.4); }
    body.dm .streak-badge { background:rgba(180,130,0,.1);border-color:rgba(180,130,0,.25);color:#b27e00; }
    body.dm .nav-card   { background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12); }
    body.dm .nav-card:hover { background:rgba(0,0,0,.09); }
    body.dm .nav-card.primary { background:rgba(var(--theme-color-rgb,59,130,246),.12);border-color:rgba(var(--theme-color-rgb,59,130,246),.3); }
    body.dm .nav-label  { color:rgba(0,0,0,.75); }
    body.dm .nav-card.primary .nav-label { color:rgba(0,0,0,.85); }
    body.dm .nav-sub    { color:rgba(0,0,0,.35); }
    body.dm .account-btn{ color:rgba(0,0,0,.5);background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1); }
    body.dm .quiz-fab,
    body.dm .vocab-fab  { color:rgba(0,0,0,.5);background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12); }

    @media (max-width:480px) {
      .nav-grid  { gap:10px; }
      .nav-card  { padding:22px 10px 18px;border-radius:16px; }
      .nav-icon  { font-size:22px; }
      .nav-label { font-size:12px; }
      .logo-word { font-size:clamp(48px,14vw,72px); }
      .vocab-fab { left:auto;right:28px;bottom:80px; }
    }
  </style>
</head>
<body>

  <div id="bg-image" class="bg-image"></div>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <!-- 账号 -->
  <div class="account-bar">
    <span id="account-display" class="account-btn" style="display:none"></span>
    <button class="account-btn" id="btn-login">登录</button>
  </div>

  <!-- 左下角快捷入口 -->
  <a href="quiz.html"  class="quiz-fab">词汇测试 →</a>
  <a href="vocab.html" class="vocab-fab">词汇图谱 →</a>

  <div class="home-wrap">
    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-word">Foreign</div>
      <div class="logo-sub">IMMERSIVE ENGLISH · 沉浸式英语</div>
    </div>

    <!-- 连击徽章 -->
    <div class="streak-badge hidden" id="streak-badge">
      <span>🌟 连击</span>
      <span class="streak-num" id="streak-num">0</span>
      <span>天</span>
    </div>

    <!-- 三大入口 -->
    <nav class="nav-grid">
      <a href="learn.html" class="nav-card primary">
        <span class="nav-icon">📖</span>
        <span class="nav-label">每日学习</span>
        <span class="nav-sub" id="learn-sub">TODAY</span>
      </a>
      <a href="wordbank.html" class="nav-card">
        <span class="nav-icon">📚</span>
        <span class="nav-label">单词库</span>
        <span class="nav-sub" id="wordbank-sub">WORDS</span>
      </a>
      <a href="review.html" class="nav-card">
        <span class="nav-icon">🔥</span>
        <span class="nav-label">回炉本</span>
        <span class="nav-sub" id="wrong-sub">REVIEW</span>
      </a>
    </nav>
  </div>

  <!-- 主题选择器（由 main.js 渲染） -->
  <div id="theme-dock"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
