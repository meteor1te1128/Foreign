<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>每日学习 · Foreign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/theme-buttons.css"/>
  <link rel="stylesheet" href="css/learn.css"/>
  <style>
    /* ── 返回重选按钮 ── */
    .back-to-card-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      color: rgba(255,255,255,.5);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .18s;
      margin-bottom: 12px;
      width: fit-content;
    }
    .back-to-card-btn:hover {
      background: rgba(255,255,255,.13);
      border-color: rgba(255,255,255,.25);
      color: rgba(255,255,255,.85);
    }
    body.dm .back-to-card-btn {
      background: rgba(0,0,0,.05);
      border-color: rgba(0,0,0,.1);
      color: rgba(0,0,0,.45);
    }
    body.dm .back-to-card-btn:hover {
      background: rgba(0,0,0,.1);
      color: rgba(0,0,0,.75);
    }
  </style>
</head>
<body>

  <div id="bg-image" class="bg-image"></div>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <a href="index.html" class="back-btn">← 返回</a>

  <!-- ── 加载中 ── -->
  <section id="screen-loading" class="screen active">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <p class="loading-text">加载今日单词…</p>
    </div>
  </section>

  <!-- ── 今日计划 ── -->
  <section id="screen-intro" class="screen">
    <div class="learn-card intro-card">
      <p class="intro-date" id="intro-date-str">今日</p>
      <h1 class="intro-title">今日学习</h1>
      <div class="intro-stats">
        <div class="stat-item">
          <span class="stat-num" id="intro-new-count">0</span>
          <span class="stat-label">新词</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="intro-review-count">0</span>
          <span class="stat-label">复习</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="intro-total-count">0</span>
          <span class="stat-label">合计</span>
        </div>
      </div>
      <div class="intro-streak">
        🌟 连击 <span id="intro-streak-count">0</span> 天
      </div>
      <button class="btn-primary" id="btn-start-learn">开始学习 →</button>
    </div>
  </section>

  <!-- ── 情景卡片 ── -->
  <section id="screen-card" class="screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>每日学习</span>
        <span id="card-progress-text">1 / ?</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="card-progress-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="learn-card">
      <div class="card-tags">
        <span class="card-badge" id="card-type-badge">新词</span>
        <span class="card-dim"   id="card-dim-label"></span>
        <span class="card-level" id="card-level-label"></span>
      </div>
      <div class="card-word-wrap">
        <h2 class="card-word"     id="card-word"></h2>
        <p  class="card-phonetic" id="card-phonetic"></p>
      </div>
      <p class="card-meaning" id="card-meaning"></p>
      <p class="card-sentence" id="card-sentence"></p>
      <button class="btn-secondary" id="card-reveal-btn">查看翻译</button>
      <p class="card-translation hidden" id="card-translation"></p>
      <div class="card-rating-area hidden" id="card-rating-area">
        <p class="rating-label">你记得吗？</p>
        <div class="rating-btns">
          <button class="rating-btn rating-again" data-rating="1">又忘了</button>
          <button class="rating-btn rating-hard"  data-rating="2">勉强</button>
          <button class="rating-btn rating-good"  data-rating="3">记住了</button>
          <button class="rating-btn rating-easy"  data-rating="4">轻松</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ── 填空题 ── -->
  <section id="screen-fill" class="screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>填空练习</span>
        <span id="fill-progress-text">1 / ?</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill-progress-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="learn-card">
      <!-- 返回重选按钮 -->
      <button class="back-to-card-btn" id="btn-back-to-card">
        ← 返回重选评分
      </button>

      <p class="fill-context">FILL IN THE BLANK</p>
      <p class="fill-meaning-hint" id="fill-meaning"></p>
      <div class="fill-sentence-wrap" id="fill-sentence"></div>
      <p class="fill-hint-text" id="fill-hint"></p>
      <div class="fill-feedback hidden" id="fill-feedback"></div>
      <button class="btn-primary"   id="fill-confirm-btn">确认答案</button>
      <button class="btn-primary hidden" id="fill-next-btn">继续 →</button>
    </div>
  </section>

  <!-- ── 结算 ── -->
  <section id="screen-result" class="screen">
    <div class="learn-card" style="text-align:center">
      <p class="result-title">今日完成！</p>
      <p class="result-msg" id="result-msg">掌握得不错</p>
      <div class="result-score">
        <div class="result-pct" id="result-pct">—%</div>
        <div class="result-detail">
          答对 <span id="result-correct">0</span> /
          <span id="result-total">0</span>
        </div>
      </div>
      <div class="result-bar-wrap">
        <div class="result-bar" id="result-bar"></div>
      </div>
      <div class="result-streak-wrap">
        🌟 连击 <span id="result-streak">0</span> 天
      </div>
      <button class="btn-primary"   id="btn-result-home">回到首页</button>
      <button class="btn-secondary" id="btn-result-again" style="margin-top:8px">
        再练一遍错题
      </button>
    </div>
  </section>

  <script type="module">
    import { startAnim } from './js/animations.js';
    const THEME_IMGS  = {ocean:'assets/images/ocean.jpg',fog_forest:'assets/images/fog_forest.jpg',galaxy:'assets/images/galaxy.jpg',rain:'assets/images/rain.jpg',aurora:'assets/images/aurora.jpg',sakura:'assets/images/sakura.jpg',sunset:'assets/images/sunset.jpg',snow:'assets/images/snow.jpg',forest_green:'assets/images/forest_green.jpg'};
    const THEME_ANIMS = {ocean:'ocean',fog_forest:'mist',galaxy:'stars',rain:'rain',aurora:'aurora',sakura:'sakura',sunset:'clouds',snow:'snow',forest_green:'forest'};
    const theme = localStorage.getItem('fg_theme') || 'ocean';
    document.body.className = `theme-${theme}`;
    if(theme==='white'){document.body.style.background='#f6f5f0';document.body.classList.add('dm');}
    else if(theme==='black'){document.body.style.background='#080808';}
    const bg = document.getElementById('bg-image');
    const cv = document.getElementById('bg-canvas');
    cv.width=window.innerWidth; cv.height=window.innerHeight;
    window.addEventListener('resize',()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;});
    if(THEME_IMGS[theme]){bg.style.backgroundImage=`url(${THEME_IMGS[theme]})`;bg.style.opacity='1';}
    else{bg.style.opacity='0';}
    if(THEME_ANIMS[theme]) startAnim(THEME_ANIMS[theme], cv);
  </script>
  <script type="module" src="js/learn.js"></script>
</body>
</html>
