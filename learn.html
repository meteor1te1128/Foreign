<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日学习 · Foreign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/theme-buttons.css" />
  <link rel="stylesheet" href="css/learn.css" />
</head>
<body class="theme-ocean">

  <!-- 背景层 -->
  <div id="bg-image" class="bg-image"></div>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <!-- 返回 -->
  <a href="index.html" class="back-btn">← 返回</a>

  <!-- ── Loading ─────────────────────────────────────────── -->
  <section id="screen-loading" class="screen active">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </section>

  <!-- ── Intro ───────────────────────────────────────────── -->
  <section id="screen-intro" class="screen">
    <div class="learn-card">
      <p class="intro-title">今日学习</p>
      <p class="intro-date" id="intro-date-str">LOADING...</p>

      <div class="intro-stats">
        <div class="stat-box">
          <span class="stat-num" id="intro-new-count">0</span>
          <span class="stat-label">新词</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="intro-review-count">0</span>
          <span class="stat-label">复习</span>
        </div>
        <div class="stat-box streak-box">
          <span class="stat-num" id="intro-streak-count">0</span>
          <span class="stat-label">连击天</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="intro-total-count">0</span>
          <span class="stat-label">本次合计</span>
        </div>
      </div>

      <button class="btn-primary" id="btn-start-learn">开始学习</button>
      <a href="index.html" class="btn-secondary" style="display:block;text-align:center;text-decoration:none;padding:12px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.08);">今天先跳过</a>
    </div>
  </section>

  <!-- ── 情景卡片 ─────────────────────────────────────────── -->
  <section id="screen-card" class="screen">
    <!-- 进度 -->
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>PROGRESS</span>
        <span id="card-progress-text">1 / 10</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="card-progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="learn-card">
      <!-- 标签 -->
      <div class="card-tags">
        <span class="tag" id="card-type-badge" data-type="new">新词</span>
        <span class="tag" id="card-dim-label">☀️ 日常词汇</span>
        <span class="tag" id="card-level-label">B1</span>
      </div>

      <!-- 单词主体 -->
      <div class="card-word" id="card-word">word</div>
      <div class="card-phonetic" id="card-phonetic">/wɜːrd/</div>
      <div class="card-meaning" id="card-meaning">含义</div>

      <!-- 例句 -->
      <div class="card-sentence" id="card-sentence">Example sentence here.</div>
      <div class="card-translation hidden" id="card-translation">中文翻译</div>

      <!-- 操作 -->
      <button class="btn-reveal" id="card-reveal-btn">查看翻译 · 自我评估</button>

      <div class="rating-area hidden" id="card-rating-area">
        <button class="btn-rating" data-rating="1">
          <span class="rating-emoji">😰</span>
          <span class="rating-label">又忘了</span>
        </button>
        <button class="btn-rating" data-rating="2">
          <span class="rating-emoji">😅</span>
          <span class="rating-label">勉强</span>
        </button>
        <button class="btn-rating" data-rating="3">
          <span class="rating-emoji">😊</span>
          <span class="rating-label">记住了</span>
        </button>
        <button class="btn-rating" data-rating="4">
          <span class="rating-emoji">😎</span>
          <span class="rating-label">轻松</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ── 填空题 ────────────────────────────────────────────── -->
  <section id="screen-fill" class="screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>FILL IN</span>
        <span id="fill-progress-text">1 / 10</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill-progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="learn-card">
      <p class="fill-context">FILL IN THE BLANK</p>
      <p class="fill-meaning-hint" id="fill-meaning">含义</p>

      <div class="fill-sentence-wrap" id="fill-sentence">
        <!-- 动态生成：文字 + input + 文字 -->
      </div>

      <p class="fill-hint-text" id="fill-hint">提示：w___d</p>

      <div class="fill-feedback hidden" id="fill-feedback"></div>

      <button class="btn-primary" id="fill-confirm-btn">确认答案</button>
      <button class="btn-primary hidden" id="fill-next-btn">继续 →</button>
    </div>
  </section>

  <!-- ── 结算 ──────────────────────────────────────────────── -->
  <section id="screen-result" class="screen">
    <div class="learn-card" style="text-align:center">
      <p class="result-title">完成！</p>
      <p class="result-msg" id="result-msg">太厉害了！🎉</p>

      <div class="result-score">
        <div class="result-pct" id="result-pct">—%</div>
        <div class="result-detail">
          答对 <span id="result-correct">0</span> / <span id="result-total">0</span> 题
        </div>
      </div>

      <div class="result-bar-wrap">
        <div class="result-bar" id="result-bar"></div>
      </div>

      <div class="result-streak-row">
        <span>🌟 连击</span>
        <span class="result-streak-num" id="result-streak">0</span>
        <span>天</span>
      </div>

      <button class="btn-primary" id="btn-result-home">回到首页</button>
      <button class="btn-secondary" id="btn-result-again">再练一遍错题</button>
    </div>
  </section>

  <!-- scripts -->
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/animations.js"></script>
  <script type="module">
    // 设置今日日期显示
    const d = new Date();
    const dateStr = d.toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'long' });
    document.getElementById('intro-date-str').textContent = dateStr.toUpperCase();
  </script>
  <script type="module" src="js/learn.js"></script>
</body>
</html>
