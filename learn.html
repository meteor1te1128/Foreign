<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日学习 · Foreign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/theme-buttons.css" />
  <link rel="stylesheet" href="css/learn.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <div id="bg-image" class="bg-image"></div>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <button class="back-btn" onclick="history.length > 1 ? history.back() : location.href='index.html'">← 返回</button>

  <!-- Loading -->
  <section id="screen-loading" class="screen active">
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </section>

  <!-- Intro -->
  <section id="screen-intro" class="screen">
    <div class="learn-card">
      <p class="intro-title">今日学习</p>
      <p class="intro-date" id="intro-date-str"></p>
      <div class="intro-stats">
        <div class="stat-box">
          <span class="stat-num" id="intro-new-count">0</span>
          <span class="stat-label">新词</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="intro-review-count">0</span>
          <span class="stat-label">复习</span>
        </div>
        <div class="stat-box streak-box">
          <span class="stat-num" id="intro-streak-count">0</span>
          <span class="stat-label">连击天</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="intro-total-count">0</span>
          <span class="stat-label">本次合计</span>
        </div>
      </div>
      <button class="btn-primary" id="btn-start-learn">开始学习</button>
      <a href="index.html" style="display:block;text-align:center;text-decoration:none;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:rgba(255,255,255,0.4);">今天先跳过</a>
    </div>
  </section>

  <!-- 情景卡片 -->
  <section id="screen-card" class="screen">
    <div class="progress-wrap">
      <div class="progress-meta"><span>PROGRESS</span><span id="card-progress-text">1 / 10</span></div>
      <div class="progress-track"><div class="progress-fill" id="card-progress-bar" style="width:0%"></div></div>
    </div>
    <div class="learn-card">
      <div class="card-tags">
        <span class="tag" id="card-type-badge" data-type="new">新词</span>
        <span class="tag" id="card-dim-label">☀️ 日常词汇</span>
        <span class="tag" id="card-level-label">B1</span>
      </div>
      <div class="card-word" id="card-word">word</div>
      <div class="card-phonetic" id="card-phonetic">/wɜːrd/</div>
      <div class="card-meaning" id="card-meaning">含义</div>
      <div class="card-sentence" id="card-sentence"></div>
      <div class="card-translation" id="card-translation"></div>
      <div class="rating-area" id="card-rating-area">
        <button class="btn-rating btn-rating-bad" data-rating="1">
          <span class="rating-emoji">😰</span>
          <span class="rating-label">没记住</span>
        </button>
        <button class="btn-rating btn-rating-good" data-rating="3">
          <span class="rating-emoji">😊</span>
          <span class="rating-label">记住了</span>
        </button>
      </div>
    </div>
  </section>

  <!-- 填空题 -->
  <section id="screen-fill" class="screen">
    <div class="progress-wrap">
      <div class="progress-meta"><span>FILL IN THE BLANK</span><span id="fill-progress-text">1 / 10</span></div>
      <div class="progress-track"><div class="progress-fill" id="fill-progress-bar" style="width:0%"></div></div>
    </div>
    <div class="learn-card">
      <p class="fill-context">根据中文含义，填入英文单词</p>
      <p class="fill-meaning-hint" id="fill-meaning">含义</p>
      <div class="fill-sentence-wrap" id="fill-sentence"></div>
      <p class="fill-hint-text" id="fill-hint">提示：w___d</p>
      <div class="fill-feedback hidden" id="fill-feedback"></div>
      <button class="btn-primary" id="fill-confirm-btn">确认答案</button>
      <button class="btn-primary hidden" id="fill-next-btn">继续 →</button>
    </div>
  </section>

  <!-- 结算 -->
  <section id="screen-result" class="screen">
    <div class="learn-card" style="text-align:center">
      <p class="result-title">完成！</p>
      <p class="result-msg" id="result-msg">太厉害了！🎉</p>
      <div class="result-score">
        <div class="result-pct" id="result-pct">—%</div>
        <div class="result-detail">答对 <span id="result-correct">0</span> / <span id="result-total">0</span> 题</div>
      </div>
      <div class="result-bar-wrap"><div class="result-bar" id="result-bar"></div></div>
      <div class="result-streak-row">
        <span>连击</span><span class="result-streak-num" id="result-streak">0</span><span>天 🌟</span>
      </div>
      <button class="btn-primary" id="btn-result-home">回到首页</button>
      <button class="btn-secondary" id="btn-result-again">再练一遍错题</button>
    </div>
  </section>

  <script type="module">
    import { startAnim } from './js/animations.js';
    const THEME_IMGS = {
      ocean:'assets/images/ocean.jpg', fog_forest:'assets/images/fog_forest.jpg',
      galaxy:'assets/images/galaxy.jpg', rain:'assets/images/rain.jpg',
      aurora:'assets/images/aurora.jpg', sakura:'assets/images/sakura.jpg',
      sunset:'assets/images/sunset.jpg', snow:'assets/images/snow.jpg',
      forest_green:'assets/images/forest_green.jpg',
    };
    // fix #4: aurora 动画已废弃，改为 none
    const THEME_ANIMS = {
      ocean:'ocean', fog_forest:'mist', galaxy:'stars', rain:'rain',
      aurora:'none', sakura:'sakura', sunset:'clouds', snow:'snow', forest_green:'forest',
    };
    const theme = localStorage.getItem('fg_theme') || 'ocean';
    document.body.className = `theme-${theme}`;
    if (theme === 'white') { document.body.style.background='#f6f5f0'; document.body.classList.add('dm'); }
    else if (theme === 'black') { document.body.style.background='#080808'; }
    const bg = document.getElementById('bg-image');
    const cv = document.getElementById('bg-canvas');
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    // fix #6: resize 只更新 canvas 尺寸，不重启动画
    window.addEventListener('resize', () => { cv.width=window.innerWidth; cv.height=window.innerHeight; });
    if (THEME_IMGS[theme]) { bg.style.backgroundImage=`url(${THEME_IMGS[theme]})`; bg.style.opacity='1'; }
    else { bg.style.opacity='0'; }
    // fix #4: 排除 'none' 再调用 startAnim
    if (THEME_ANIMS[theme] && THEME_ANIMS[theme] !== 'none') startAnim(THEME_ANIMS[theme], cv);
  </script>
  <script type="module" src="js/learn.js"></script>
</body>
</html>
