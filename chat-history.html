<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对话历史 · Foreign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/theme-buttons.css" />
  <link rel="stylesheet" href="css/dock.css" />
  <style>
    .bg-image{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;animation:bgBreath 16s ease-in-out infinite alternate}
    .bg-canvas{position:fixed;inset:0;z-index:1;width:100%;height:100%;pointer-events:none}
    .bg-overlay{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 20%,rgba(0,0,0,.55) 100%)}
    @keyframes bgBreath{0%{transform:scale(1)}100%{transform:scale(1.035)}}
    .page-wrap{position:relative;z-index:10;max-width:760px;margin:0 auto;padding:80px 24px 100px;min-height:100vh}
    .page-header{display:flex;align-items:center;gap:16px;margin-bottom:32px}
    .back-link{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:7px 14px;text-decoration:none;transition:all .2s;letter-spacing:.05em;flex-shrink:0}
    .back-link:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.13)}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vw,44px);font-weight:600;color:#fff;letter-spacing:-.02em}
    .history-stats{display:flex;gap:20px;margin-bottom:28px;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.38);letter-spacing:.06em}
    .history-stats strong{color:rgba(255,255,255,.72);font-size:15px;font-family:'Cormorant Garamond',serif;font-weight:600}
    .history-list{display:flex;flex-direction:column;gap:14px}
    .session-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:18px;overflow:hidden;transition:border-color .2s}
    .session-card.open{border-color:rgba(255,255,255,.22)}
    .session-header{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;transition:background .18s}
    .session-header:hover{background:rgba(255,255,255,.05)}
    .session-scene{font-size:24px;flex-shrink:0}
    .session-info{flex:1;min-width:0}
    .session-label{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff;margin-bottom:2px}
    .session-date{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.06em}
    .session-score{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--theme-color,#3b82f6);flex-shrink:0;line-height:1}
    .session-chevron{font-size:12px;color:rgba(255,255,255,.28);flex-shrink:0;transition:transform .22s}
    .session-card.open .session-chevron{transform:rotate(90deg)}
    .session-body{display:none;padding:0 20px 20px;border-top:1px solid rgba(255,255,255,.08)}
    .session-card.open .session-body{display:block}
    .review-section{margin-top:16px}
    .review-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:10px}
    .feedback-text{font-size:13px;color:rgba(255,255,255,.65);line-height:1.65}
    .correction-list{display:flex;flex-direction:column;gap:8px}
    .correction-item{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#fde68a;line-height:1.5}
    .correction-item::before{content:'💡 '}
    .no-correction{font-size:12px;color:rgba(255,255,255,.3);font-family:'Space Mono',monospace;letter-spacing:.04em}
    .chip-row{display:flex;flex-wrap:wrap;gap:7px}
    .chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:7px;padding:4px 11px;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.04em}
    .chip.used{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:#4ade80}
    .toggle-messages{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.35);background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .18s;margin-top:14px}
    .toggle-messages:hover{color:rgba(255,255,255,.65);border-color:rgba(255,255,255,.22)}
    .messages-wrap{margin-top:14px;display:flex;flex-direction:column;gap:8px}
    .messages-wrap.collapsed{display:none}
    .msg-row{display:flex;flex-direction:column;gap:3px}
    .msg-row.user-row{align-items:flex-end}
    .msg-row.ai-row{align-items:flex-start}
    .msg-bubble{max-width:85%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5}
    .msg-bubble.user-bubble{background:var(--theme-color,#3b82f6);color:#fff;border-bottom-right-radius:4px}
    .msg-bubble.ai-bubble{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-bottom-left-radius:4px}
    .msg-bubble.corr-bubble{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.18);color:#fde68a;font-size:12px;border-bottom-left-radius:4px}
    .empty-state{text-align:center;padding:80px 24px;color:rgba(255,255,255,.3);font-family:'DM Sans',sans-serif}
    .empty-icon{font-size:52px;margin-bottom:16px}
    .empty-state p{font-size:14px;line-height:1.8}
    .empty-state a{color:var(--theme-color,#3b82f6);text-decoration:none;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em;border:1px solid;border-radius:8px;padding:8px 18px;display:inline-block;margin-top:14px;transition:opacity .2s}
    .empty-state a:hover{opacity:.75}

    /* ── body.dm ── */
    body.dm .back-link{color:rgba(0,0,0,.5);background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12)}
    body.dm .page-title{color:#111}
    body.dm .history-stats{color:rgba(0,0,0,.38)}
    body.dm .history-stats strong{color:rgba(0,0,0,.7)}
    body.dm .session-card{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}
    body.dm .session-card.open{border-color:rgba(0,0,0,.18)}
    body.dm .session-header:hover{background:rgba(0,0,0,.04)}
    body.dm .session-label{color:#111}
    body.dm .session-date{color:rgba(0,0,0,.35)}
    body.dm .session-chevron{color:rgba(0,0,0,.22)}
    body.dm .session-body{border-top-color:rgba(0,0,0,.08)}
    body.dm .review-label{color:rgba(0,0,0,.35)}
    body.dm .feedback-text{color:rgba(0,0,0,.6)}
    body.dm .no-correction{color:rgba(0,0,0,.35)}
    body.dm .chip{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.55)}
    body.dm .msg-bubble.ai-bubble{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.7)}
    body.dm .msg-bubble.corr-bubble{background:rgba(180,83,9,.08);border-color:rgba(180,83,9,.2);color:#92400e}
    body.dm .toggle-messages{color:rgba(0,0,0,.38);border-color:rgba(0,0,0,.1)}
    body.dm .toggle-messages:hover{color:rgba(0,0,0,.65);border-color:rgba(0,0,0,.22)}
    body.dm .empty-state{color:rgba(0,0,0,.3)}
  </style>
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div id="bg-image" class="bg-image"></div>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <div class="page-wrap">
    <div class="page-header">
      <a href="ai.html" class="back-link">← 返回</a>
      <h1 class="page-title">对话历史</h1>
    </div>
    <div class="history-stats">
      <span>共 <strong id="stat-total">0</strong> 次对话</span>
      <span>平均评分 <strong id="stat-avg">—</strong></span>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <script type="module">
    import { startAnim } from './js/animations.js';
    import { WORDS } from './js/wordbank.js';
    import { initDock } from './js/dock.js';

    const THEME_IMGS   = {ocean:'assets/images/ocean.jpg',fog_forest:'assets/images/fog_forest.jpg',galaxy:'assets/images/galaxy.jpg',rain:'assets/images/rain.jpg',aurora:'assets/images/aurora.jpg',sakura:'assets/images/sakura.jpg',sunset:'assets/images/sunset.jpg',snow:'assets/images/snow.jpg',forest_green:'assets/images/forest_green.jpg'};
    const THEME_ANIMS  = {ocean:'ocean',fog_forest:'mist',galaxy:'stars',rain:'rain',aurora:'none',sakura:'sakura',sunset:'clouds',snow:'snow',forest_green:'forest'};
    const THEME_COLORS = {ocean:'#3b82f6',fog_forest:'#6ee7b7',galaxy:'#818cf8',rain:'#93c5fd',aurora:'#34d399',sakura:'#f9a8d4',sunset:'#fb923c',snow:'#bae6fd',forest_green:'#86efac',white:'#64748b',black:'#475569'};
    const theme = localStorage.getItem('fg_theme') || 'ocean';
    document.body.className = `theme-${theme}`;
    document.documentElement.style.setProperty('--theme-color', THEME_COLORS[theme] || '#3b82f6');
    if (theme === 'white')      { document.body.style.background = '#f6f5f0'; document.body.classList.add('dm'); }
    else if (theme === 'black') { document.body.style.background = '#080808'; document.body.classList.add('dm'); }
    const bgEl = document.getElementById('bg-image'), cvEl = document.getElementById('bg-canvas');
    cvEl.width = window.innerWidth; cvEl.height = window.innerHeight;
    window.addEventListener('resize', () => { cvEl.width = window.innerWidth; cvEl.height = window.innerHeight; });
    if (THEME_IMGS[theme]) { bgEl.style.backgroundImage = `url(${THEME_IMGS[theme]})`; bgEl.style.opacity = '1'; }
    else { bgEl.style.opacity = '0'; }
    if (THEME_ANIMS[theme] && THEME_ANIMS[theme] !== 'none') startAnim(THEME_ANIMS[theme], cvEl);
    import('./js/transitions.js');
    initDock();

    const SCENE_ICONS = {cafe:'☕',interview:'💼',travel:'✈️',friend:'😊',shopping:'🛍️',doctor:'🏥',custom:'✨'};
    function wordById(id) { return WORDS.find(w => w.id === id); }
    function formatDate(iso) {
      const d = new Date(iso);
      return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function renderHistory() {
      let history = [];
      try { history = JSON.parse(localStorage.getItem('fg_chat_history') || '[]'); } catch {}
      const list = document.getElementById('history-list');
      document.getElementById('stat-total').textContent = history.length;
      const scored = history.filter(s => s.score != null);
      const avg    = scored.length ? Math.round(scored.reduce((s, h) => s + h.score, 0) / scored.length) : null;
      document.getElementById('stat-avg').textContent = avg != null ? avg : '—';

      if (!history.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">💬</div><p>还没有对话记录<br>完成一次 AI 对话后这里会显示复盘</p><a href="ai.html">去开始对话 →</a></div>`;
        return;
      }

      list.innerHTML = '';
      history.forEach((session, idx) => {
        const icon         = SCENE_ICONS[session.scene] || '💬';
        const scoreDisplay = session.score != null ? session.score : '—';
        const allWords     = (session.wordIds || []).map(wordById).filter(Boolean);
        const usedSet      = new Set(session.wordsUsedIds || []);
        const corrections  = session.corrections || [];
        const msgs         = (session.messages || []).filter(m => m.content !== 'Start the conversation.');

        const card = document.createElement('div');
        card.className = 'session-card';
        card.innerHTML = `
          <div class="session-header">
            <div class="session-scene">${icon}</div>
            <div class="session-info">
              <div class="session-label">${session.sceneLabel || '未知场景'}</div>
              <div class="session-date">${formatDate(session.date)}</div>
            </div>
            <div class="session-score">${scoreDisplay}</div>
            <div class="session-chevron">▶</div>
          </div>
          <div class="session-body">
            ${session.feedback ? `<div class="review-section"><div class="review-label">AI 评价</div><div class="feedback-text">${session.feedback}</div></div>` : ''}
            <div class="review-section">
              <div class="review-label">纠错记录 · ${corrections.length} 处</div>
              ${corrections.length
                ? `<div class="correction-list">${corrections.map(c => `<div class="correction-item">${c}</div>`).join('')}</div>`
                : `<div class="no-correction">✓ 本次对话没有语法错误，继续保持</div>`}
            </div>
            ${allWords.length ? `
            <div class="review-section">
              <div class="review-label">本场词汇 · 绿色=你用到了</div>
              <div class="chip-row">${allWords.map(w => `<span class="chip${usedSet.has(w.id) ? ' used' : ''}">${w.word}</span>`).join('')}</div>
            </div>` : ''}
            ${msgs.length ? `
            <button class="toggle-messages" data-idx="${idx}">展开完整对话 ▾</button>
            <div class="messages-wrap collapsed" id="msgs-${idx}">
              ${msgs.map(m => {
                const isUser    = m.role === 'user';
                const corrMatch = !isUser && m.content.match(/\[CORRECTION\]:\s*([\s\S]*?)\[REPLY\]:\s*([\s\S]*)/);
                if (corrMatch) return `<div class="msg-row ai-row"><div class="msg-bubble corr-bubble">💡 ${corrMatch[1].trim()}</div><div class="msg-bubble ai-bubble">${corrMatch[2].trim()}</div></div>`;
                const replyMatch = !isUser && m.content.match(/\[REPLY\]:\s*([\s\S]*)/);
                const text = replyMatch ? replyMatch[1].trim() : m.content;
                return `<div class="msg-row ${isUser ? 'user-row' : 'ai-row'}"><div class="msg-bubble ${isUser ? 'user-bubble' : 'ai-bubble'}">${text}</div></div>`;
              }).join('')}
            </div>` : ''}
          </div>`;

        card.querySelector('.session-header').addEventListener('click', () => card.classList.toggle('open'));
        const toggleBtn = card.querySelector('.toggle-messages');
        if (toggleBtn) {
          toggleBtn.addEventListener('click', e => {
            e.stopPropagation();
            const msgsWrap = document.getElementById(`msgs-${idx}`);
            const collapsed = msgsWrap.classList.toggle('collapsed');
            toggleBtn.textContent = collapsed ? '展开完整对话 ▾' : '收起对话 ▴';
          });
        }
        list.appendChild(card);
      });
    }
    renderHistory();
  </script>
</body>
</html>
